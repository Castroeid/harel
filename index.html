<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עלייה לתורה להראל שקד</title>
  <meta name="description" content="נרגשים להזמין אתכם לעלייה לתורה של הראל שקד בבית הכנסת לב חריש" />

  <!-- WhatsApp / Facebook preview -->
  <meta property="og:title" content="עלייה לתורה להראל שקד" />
  <meta property="og:description" content="נרגשים להזמין אתכם | יום שני 18/05 | בית הכנסת לב חריש" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/preview.png" />
  <meta property="og:url" content="https://castroeid.github.io/harel-shaked-invite/" />

  <style>
    * { box-sizing: border-box; }

    :root {
      --navy: #071f38;
      --navy-soft: rgba(7, 31, 56, .92);
      --gold: #c7a45a;
      --gold-light: #e6cf91;
      --paper: #fff6e7;
      --ink: #092641;
      --muted: #6a5631;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #f8e8c7 0%, #123553 48%, #031324 100%);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .invite {
      width: min(100%, 430px);
      min-height: calc(100vh - 20px);
      background: var(--navy);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0 26px 70px rgba(0,0,0,.42);
    }

    .frame {
      min-height: calc(100vh - 36px);
      border: 2px solid var(--gold);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background: var(--paper);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(199,164,90,.75);
      border-radius: 16px;
      pointer-events: none;
      z-index: 6;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: .34;
      z-index: 0;
    }

    .veil {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,246,231,.96) 0%, rgba(255,246,231,.9) 42%, rgba(255,246,231,.78) 58%, rgba(7,31,56,.96) 78%, rgba(7,31,56,1) 100%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      padding: 34px 20px 22px;
    }

    .hero {
      text-align: center;
      padding: 8px 8px 16px;
    }

    .top-line {
      margin: 0 0 8px;
      font-size: clamp(1.15rem, 4vw, 1.42rem);
      font-weight: 900;
      color: var(--ink);
    }

    .sub-line {
      margin: 0;
      font-size: clamp(1rem, 3.5vw, 1.18rem);
      font-weight: 800;
      color: #244967;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(4.1rem, 17vw, 6rem);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--ink);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #a98235;
      font-size: 1.65rem;
      margin: 6px auto 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 72px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a98235);
    }

    .divider::after { background: linear-gradient(90deg, #a98235, transparent); }

    .spacer {
      flex: 1;
      min-height: 92px;
    }

    .details-area {
      margin-top: auto;
      padding-top: 18px;
    }

    .details {
      background: rgba(255, 248, 234, .97);
      border: 2px solid var(--gold);
      border-radius: 24px;
      padding: 18px 16px 16px;
      box-shadow: 0 16px 30px rgba(0,0,0,.2);
    }

    .date-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: center;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .date-box {
      border: 1px solid rgba(199,164,90,.55);
      border-radius: 16px;
      padding: 12px 8px;
      background: #fffdf6;
    }

    .date-main {
      font-size: clamp(1.75rem, 8vw, 2.35rem);
      line-height: 1;
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
    }

    .date-sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 900;
      font-size: .95rem;
    }

    .schedule {
      border-top: 1px solid rgba(199,164,90,.55);
      border-bottom: 1px solid rgba(199,164,90,.55);
      margin: 14px 0;
      padding: 8px 0;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      direction: ltr;
      gap: 12px;
      align-items: center;
      padding: 9px 2px;
      border-bottom: 1px solid rgba(199,164,90,.22);
    }

    .schedule-row:last-child { border-bottom: 0; }

    .time {
      direction: rtl;
      text-align: center;
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 900;
      background: rgba(199,164,90,.13);
      border-radius: 999px;
      padding: 7px 6px;
      white-space: nowrap;
    }

    .event {
      direction: rtl;
      text-align: right;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.25;
      font-weight: 900;
    }

    .place {
      text-align: center;
      padding: 2px 0 12px;
    }

    .place-title {
      font-size: clamp(1.35rem, 6vw, 1.75rem);
      line-height: 1.1;
      font-weight: 900;
      color: var(--ink);
    }

    .address {
      margin-top: 7px;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--muted);
    }

    .waze-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(100%, 310px);
      margin: 2px auto 0;
      min-height: 52px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0a3d68, var(--navy));
      color: #fff8ea;
      text-decoration: none;
      border: 2px solid var(--gold);
      font-size: 1.1rem;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
    }

    .waze-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 1.1rem;
      flex: 0 0 auto;
    }

    .footer {
      text-align: center;
      color: var(--gold-light);
      font-size: 1.32rem;
      font-weight: 900;
      margin-top: 18px;
    }

    @media (max-width: 390px) {
      body { padding: 8px; }
      .invite { padding: 6px; border-radius: 24px; }
      .content { padding: 32px 16px 20px; }
      .spacer { min-height: 74px; }
      .details { padding: 16px 12px; }
      .schedule-row { grid-template-columns: 76px 1fr; gap: 9px; }
      .event { font-size: 1rem; }
      .time { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="invite">
    <section class="frame">
      <img class="bg" src="assets/invite-bg.png" alt="" />
      <div class="veil"></div>

      <div class="content">
        <header class="hero">
          <p class="top-line">נרגשים להזמין אתכם</p>
          <p class="sub-line">לעלייה לתורה של</p>
          <h1>הראל שקד</h1>
          <div class="divider">✡</div>
        </header>

        <div class="spacer"></div>

        <section class="details-area">
          <div class="details">
            <div class="date-line">
              <div class="date-box">
                <div class="date-main">18/05</div>
                <div class="date-sub">יום שני</div>
              </div>
              <div class="date-box">
                <div class="date-main">ב׳ בסיון</div>
                <div class="date-sub">תשפ״ו</div>
              </div>
            </div>

            <div class="schedule">
              <div class="schedule-row">
                <div class="time">14:30</div>
                <div class="event">קבלת פנים</div>
              </div>
              <div class="schedule-row">
                <div class="time">15:00</div>
                <div class="event">עלייה לתורה</div>
              </div>
              <div class="schedule-row">
                <div class="time">בסיום</div>
                <div class="event">סעודה קלה חלבית</div>
              </div>
            </div>

            <div class="place">
              <div class="place-title">בית הכנסת לב חריש</div>
              <div class="address">שוהם 82, חריש</div>
            </div>

            <a class="waze-btn" href="https://waze.com/ul/hsvbc0v75s" target="_blank" rel="noopener noreferrer">
              <span>להגעה לחצו כאן</span>
              <span class="waze-icon">🚙</span>
            </a>
          </div>

          <div class="footer">נשמח לראותכם!</div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
