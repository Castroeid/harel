<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עלייה לתורה להראל שקד</title>
  <meta name="description" content="נרגשים להזמין אתכם לעלייה לתורה של הראל שקד בבית הכנסת לב חריש" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --navy: #071f38;
      --gold: #c7a45a;
      --gold-2: #e3c984;
      --paper: #fbf3e5;
      --ink: #092641;
      --muted: #6a5631;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at 50% 0%, rgba(255,244,221,.9), rgba(20,54,86,.72) 42%, #031324 100%);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .invite {
      width: min(100%, 430px);
      background: var(--navy);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0 26px 70px rgba(0,0,0,.42);
    }

    .frame {
      min-height: calc(100vh - 40px);
      border: 2px solid var(--gold);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 246, 228, .72) 0%, rgba(255, 246, 228, .58) 38%, rgba(255, 246, 228, .16) 64%, rgba(7, 31, 56, .96) 77%, rgba(7, 31, 56, 1) 100%),
        url("assets/invite-bg.png") center top / cover no-repeat;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(199,164,90,.7);
      border-radius: 16px;
      pointer-events: none;
      z-index: 10;
    }

    .header {
      text-align: center;
      padding: 44px 24px 18px;
      position: relative;
      z-index: 2;
    }

    .top-line {
      margin: 0 0 8px;
      font-size: clamp(1.15rem, 4vw, 1.45rem);
      font-weight: 900;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,.7);
    }

    .sub-line {
      margin: 0;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-weight: 800;
      color: #244967;
      text-shadow: 0 1px 0 rgba(255,255,255,.7);
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(3.9rem, 17vw, 6rem);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--ink);
      text-shadow: 0 2px 0 rgba(255,255,255,.7);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #a98235;
      font-size: 1.7rem;
      margin: 8px auto 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 74px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a98235);
    }

    .divider::after { background: linear-gradient(90deg, #a98235, transparent); }

    .spacer {
      height: clamp(270px, 44vh, 385px);
    }

    .medal {
      position: absolute;
      left: 50%;
      top: calc(44px + 205px + clamp(190px, 24vh, 250px));
      transform: translateX(-50%);
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: var(--navy);
      border: 5px solid var(--gold);
      color: var(--gold-2);
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      z-index: 3;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
    }

    .details-wrap {
      position: relative;
      z-index: 2;
      background: var(--navy);
      padding: 38px 18px 24px;
      border-top: 3px solid var(--gold);
      border-radius: 52% 52% 0 0 / 7% 7% 0 0;
    }

    .details {
      background: rgba(255, 248, 234, .96);
      border: 2px solid var(--gold);
      border-radius: 22px;
      padding: 18px 16px 16px;
      box-shadow: 0 16px 30px rgba(0,0,0,.2);
      backdrop-filter: blur(2px);
    }

    .date-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: center;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .date-box {
      border: 1px solid rgba(199,164,90,.55);
      border-radius: 16px;
      padding: 12px 8px;
      background: #fffdf6;
    }

    .date-main {
      font-size: clamp(1.75rem, 8vw, 2.35rem);
      line-height: 1;
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
    }

    .date-sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 900;
      font-size: .95rem;
    }

    .schedule {
      border-top: 1px solid rgba(199,164,90,.55);
      border-bottom: 1px solid rgba(199,164,90,.55);
      margin: 14px 0;
      padding: 8px 0;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      direction: ltr;
      gap: 12px;
      align-items: center;
      padding: 9px 2px;
      border-bottom: 1px solid rgba(199,164,90,.22);
    }

    .schedule-row:last-child { border-bottom: 0; }

    .time {
      direction: rtl;
      text-align: center;
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 900;
      background: rgba(199,164,90,.13);
      border-radius: 999px;
      padding: 7px 6px;
      white-space: nowrap;
    }

    .event {
      direction: rtl;
      text-align: right;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.25;
      font-weight: 900;
    }

    .place {
      text-align: center;
      padding: 2px 0 12px;
    }

    .place-title {
      font-size: clamp(1.35rem, 6vw, 1.75rem);
      line-height: 1.1;
      font-weight: 900;
      color: var(--ink);
    }

    .address {
      margin-top: 7px;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--muted);
    }

    .waze-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(100%, 310px);
      margin: 2px auto 0;
      min-height: 52px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0a3d68, var(--navy));
      color: #fff8ea;
      text-decoration: none;
      border: 2px solid var(--gold);
      font-size: 1.1rem;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
    }

    .waze-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 1.1rem;
      flex: 0 0 auto;
    }

    .footer {
      text-align: center;
      color: var(--gold-2);
      font-size: 1.35rem;
      font-weight: 900;
      margin-top: 20px;
    }

    @media (max-width: 390px) {
      body { padding: 8px; }
      .invite { padding: 6px; border-radius: 24px; }
      .frame { min-height: calc(100vh - 28px); }
      .header { padding: 38px 18px 16px; }
      .spacer { height: 300px; }
      .medal { display: none; }
      .details-wrap { padding: 26px 13px 22px; }
      .details { padding: 16px 12px; }
      .schedule-row { grid-template-columns: 76px 1fr; gap: 9px; }
      .event { font-size: 1rem; }
      .time { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="invite">
    <section class="frame">
      <header class="header">
        <p class="top-line">נרגשים להזמין אתכם</p>
        <p class="sub-line">לעלייה לתורה של</p>
        <h1>הראל שקד</h1>
        <div class="divider">✡</div>
      </header>

      <div class="spacer" aria-hidden="true"></div>
      <div class="medal" aria-hidden="true">✡</div>

      <section class="details-wrap">
        <div class="details">
          <div class="date-line">
            <div class="date-box">
              <div class="date-main">18/05</div>
              <div class="date-sub">יום שני</div>
            </div>
            <div class="date-box">
              <div class="date-main">ב׳ בסיון</div>
              <div class="date-sub">תשפ״ו</div>
            </div>
          </div>

          <div class="schedule">
            <div class="schedule-row">
              <div class="time">14:30</div>
              <div class="event">קבלת פנים</div>
            </div>
            <div class="schedule-row">
              <div class="time">15:00</div>
              <div class="event">עלייה לתורה</div>
            </div>
            <div class="schedule-row">
              <div class="time">בסיום</div>
              <div class="event">סעודה קלה חלבית</div>
            </div>
          </div>

          <div class="place">
            <div class="place-title">בית הכנסת לב חריש</div>
            <div class="address">שוהם 82, חריש</div>
          </div>

          <a class="waze-btn" href="https://waze.com/ul/hsvbc0v75s" target="_blank" rel="noopener noreferrer">
            <span>להגעה לחצו כאן</span>
            <span class="waze-icon">🚙</span>
          </a>
        </div>

        <div class="footer">נשמח לראותכם!</div>
      </section>
    </section>
  </main>
</body>
</html>
